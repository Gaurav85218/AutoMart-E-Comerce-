<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMart — Premium Automobile Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #f0951a;
    --accent-dark: #c97c0e;
    --navy: #0d1b2a;
    --navy2: #1a2c3f;
    --surface: #f6f7f9;
    --card: #ffffff;
    --border: #e2e5ea;
    --text: #1a1f2e;
    --muted: #6b7280;
    --danger: #e53e3e;
    --success: #22863a;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
  }

  body { font-family: 'Barlow', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: #fff;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  .header-top {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 24px;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800;
    color: var(--accent); letter-spacing: 1px; white-space: nowrap;
  }
  .logo span { color: #fff; }
  .search-bar {
    flex: 1; display: flex;
    background: #fff; border-radius: 6px; overflow: hidden;
    max-width: 600px;
  }
  .search-bar input {
    flex: 1; border: none; outline: none; padding: 10px 14px;
    font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--text);
  }
  .search-bar button {
    background: var(--accent); border: none; padding: 0 18px;
    cursor: pointer; color: #fff; font-size: 16px; font-weight: 700;
  }
  .header-actions { display: flex; gap: 12px; margin-left: auto; }
  .btn-header {
    background: none; border: 1.5px solid rgba(255,255,255,0.3);
    color: #fff; border-radius: 6px; padding: 7px 16px;
    font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-header:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
  .btn-header.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-header.primary:hover { background: var(--accent-dark); }

  .nav-strip {
    background: var(--navy2);
    display: flex; gap: 4px; padding: 6px 24px; overflow-x: auto;
  }
  .nav-pill {
    background: none; border: none; color: rgba(255,255,255,0.75);
    font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500;
    padding: 5px 14px; border-radius: 20px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .nav-pill:hover, .nav-pill.active { background: var(--accent); color: #fff; }

  /* ── LAYOUT ── */
  .page { display: flex; gap: 0; }
  .sidebar {
    width: 220px; flex-shrink: 0; padding: 20px 16px;
    background: #fff; border-right: 1px solid var(--border);
    min-height: calc(100vh - 90px);
  }
  .sidebar h3 { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .filter-group { margin-bottom: 22px; }
  .filter-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text); padding: 5px 0; cursor: pointer;
  }
  .filter-item input[type=checkbox] { accent-color: var(--accent); }
  .price-inputs { display: flex; gap: 8px; }
  .price-inputs input {
    flex: 1; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; font-size: 13px; outline: none;
  }
  .price-inputs input:focus { border-color: var(--accent); }
  .apply-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 8px; font-weight: 700; font-size: 13px;
    cursor: pointer; margin-top: 8px; font-family: 'Barlow', sans-serif;
  }

  /* ── MAIN ── */
  .main { flex: 1; padding: 20px 24px; min-width: 0; }
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .result-count { font-size: 13px; color: var(--muted); }
  .sort-select {
    border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px;
    font-family: 'Barlow', sans-serif; font-size: 13px; outline: none;
    cursor: pointer;
  }
  .sort-select:focus { border-color: var(--accent); }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .product-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    cursor: pointer; transition: box-shadow 0.2s, transform 0.2s;
    position: relative; display: flex; flex-direction: column;
  }
  .product-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .card-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
    z-index: 1;
  }
  .card-badge.out { background: #e53e3e; }
  .card-img {
    height: 160px; background: #f0f2f5;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img .no-img { font-size: 40px; color: #ccc; }
  .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; }
  .card-brand { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); margin: 3px 0 6px; line-height: 1.3; }
  .card-category { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .card-price { font-size: 18px; font-weight: 800; color: var(--text); }
  .card-price span { font-size: 12px; color: var(--muted); font-weight: 400; }
  .card-qty { font-size: 12px; color: var(--success); margin-top: 2px; }
  .card-qty.low { color: #d97706; }
  .card-qty.out-qty { color: var(--danger); }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-cart {
    flex: 1; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 8px; font-weight: 700; font-size: 12px;
    cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.15s;
  }
  .btn-cart:hover { background: var(--accent-dark); }
  .btn-icon {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; cursor: pointer; font-size: 14px; transition: border-color 0.15s, background 0.15s;
  }
  .btn-icon:hover { background: var(--surface); border-color: var(--accent); }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty .empty-icon { font-size: 56px; margin-bottom: 12px; }
  .empty h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* ── LOADING ── */
  .skeleton-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 4px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; border-radius: 14px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: transform 0.2s;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 14px 14px 0 0;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; }
  .btn-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-body { padding: 22px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-group label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px;
    font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .img-preview {
    width: 100%; height: 140px; background: var(--surface); border-radius: 7px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 8px;
    border: 2px dashed var(--border);
  }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }
  .img-preview span { font-size: 28px; color: #ccc; }
  .modal-footer {
    display: flex; gap: 10px; justify-content: flex-end;
    padding: 16px 22px; border-top: 1px solid var(--border);
  }
  .btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 9px 22px; font-weight: 600; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 14px;
  }
  .btn-save {
    background: var(--accent); color: #fff; border: none;
    border-radius: 7px; padding: 9px 28px; font-weight: 700; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 14px; transition: background 0.15s;
  }
  .btn-save:hover { background: var(--accent-dark); }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }

  /* ── DETAIL MODAL ── */
  .detail-img {
    width: 100%; height: 240px; background: var(--surface);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border-radius: 10px; margin-bottom: 18px;
  }
  .detail-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .detail-img span { font-size: 56px; color: #ccc; }
  .detail-brand { font-size: 13px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .detail-name { font-size: 22px; font-weight: 800; margin: 4px 0 6px; line-height: 1.2; }
  .detail-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
  .detail-price { font-size: 28px; font-weight: 800; color: var(--text); }
  .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .meta-chip {
    background: var(--surface); border-radius: 7px; padding: 10px 14px;
    font-size: 12px; color: var(--muted);
  }
  .meta-chip strong { display: block; font-size: 15px; color: var(--text); font-weight: 700; margin-top: 2px; }
  .detail-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-edit {
    flex: 1; background: var(--navy); color: #fff; border: none;
    border-radius: 7px; padding: 11px; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.15s;
  }
  .btn-edit:hover { background: var(--navy2); }
  .btn-delete {
    background: none; border: 1.5px solid var(--danger); color: var(--danger);
    border-radius: 7px; padding: 11px 20px; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.15s;
  }
  .btn-delete:hover { background: #fff0f0; }

  /* ── TOAST ── */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--navy); color: #fff; padding: 12px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    display: flex; align-items: center; gap: 10px;
    animation: slideIn 0.3s ease, fadeOut 0.4s ease 2.6s forwards;
    max-width: 320px;
  }
  .toast.success { border-left: 4px solid #22c55e; }
  .toast.error { border-left: 4px solid var(--danger); }
  @keyframes slideIn { from{ transform: translateX(40px); opacity:0; } to{ transform: translateX(0); opacity:1; } }
  @keyframes fadeOut { to{ opacity:0; transform: translateX(40px); } }

  /* ── CONFIRM DIALOG ── */
  .confirm-box {
    background: #fff; border-radius: 12px; padding: 28px; text-align: center;
    width: 100%; max-width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }
  .confirm-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .confirm-box p { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-confirm-del {
    background: var(--danger); color: #fff; border: none;
    border-radius: 7px; padding: 10px 28px; font-weight: 700; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 14px;
  }
  .btn-confirm-cancel {
    background: none; border: 1px solid var(--border); color: var(--text);
    border-radius: 7px; padding: 10px 22px; font-weight: 600; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 14px;
  }

  .spinner {
    width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .header-top { padding: 8px 12px; }
    .main { padding: 14px 12px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">AUTO<span>MART</span></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search cars, parts, brands..." oninput="filterProducts()">
      <button>&#128269;</button>
    </div>
    <div class="header-actions">
      <button class="btn-header primary" onclick="openAddModal()">&#43; Add Product</button>
      <button class="btn-header" onclick="loadProducts()">&#8635; Refresh</button>
    </div>
  </div>
  <div class="nav-strip" id="categoryNav">
    <button class="nav-pill active" onclick="filterCategory('', this)">All</button>
  </div>
</header>

<div class="page">
  <aside class="sidebar">
    <div class="filter-group">
      <h3>Availability</h3>
      <label class="filter-item"><input type="checkbox" id="filterAvailable" onchange="filterProducts()"> In Stock Only</label>
    </div>
    <div class="filter-group">
      <h3>Price Range (₹)</h3>
      <div class="price-inputs">
        <input type="number" id="priceMin" placeholder="Min">
        <input type="number" id="priceMax" placeholder="Max">
      </div>
      <button class="apply-btn" onclick="filterProducts()">Apply</button>
    </div>
    <div class="filter-group">
      <h3>Brands</h3>
      <div id="brandFilters"></div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <span class="result-count" id="resultCount">Loading products...</span>
      <select class="sort-select" id="sortSelect" onchange="filterProducts()">
        <option value="default">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
        <option value="qty-desc">Stock: Most</option>
      </select>
    </div>
    <div class="product-grid" id="productGrid">
      <!-- products rendered here -->
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetailIfOutside(event)">
  <div class="modal" style="max-width:500px;" id="detailModalContent">
    <div class="modal-header">
      <h2 id="detailTitle">Product Detail</h2>
      <button class="btn-close" onclick="closeModal('detailModal')">&#215;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="formModal" onclick="closeFormIfOutside(event)">
  <div class="modal" id="formModalContent">
    <div class="modal-header">
      <h2 id="formTitle">Add Product</h2>
      <button class="btn-close" onclick="closeModal('formModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="img-preview" id="imgPreview"><span>&#128247;</span></div>
      <div class="form-group">
        <label>Product Image</label>
        <input type="file" id="imageFile" accept="image/*" onchange="previewImg(this)">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="fName" placeholder="e.g. Carbon Brake Pad">
        </div>
        <div class="form-group">
          <label>Brand *</label>
          <input type="text" id="fBrand" placeholder="e.g. Bosch">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <input type="text" id="fCategory" placeholder="e.g. Brakes, Engine, Tyres">
        </div>
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" id="fPrice" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity *</label>
          <input type="number" id="fQty" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>Release Date</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="fDesc" placeholder="Brief product description..."></textarea>
      </div>
      <div class="form-group">
        <label>Available</label>
        <select id="fAvailable">
          <option value="true">Yes — In Stock</option>
          <option value="false">No — Out of Stock</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="modal-overlay" id="confirmModal">
  <div class="confirm-box">
    <h3>Delete Product?</h3>
    <p>This action cannot be undone. The product will be permanently removed.</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn-confirm-del" id="confirmDelBtn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>


<script>
const API = 'http://localhost:8080/api';
let allProducts = [];
let activeCategory = '';

async function loadProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = Array(8).fill(0).map(() =>
    '<div class="skeleton-card"><div class="skeleton" style="height:160px;border-radius:0;"></div><div style="padding:12px;"><div class="skeleton" style="height:11px;width:40%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:80%;margin-bottom:6px;"></div><div class="skeleton" style="height:20px;width:50%;margin-bottom:10px;"></div><div class="skeleton" style="height:32px;"></div></div></div>'
  ).join('');
  try {
    const res = await fetch(API + '/products');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allProducts = await res.json();
    buildCategoryNav();
    buildBrandFilters();
    filterProducts();
  } catch(e) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">warning</div><h2>Cannot reach server</h2><p>Make sure Spring Boot is running on localhost:8080</p><small style="color:red">' + e.message + '</small></div>';
    document.getElementById('resultCount').textContent = 'Connection failed';
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productGrid');
  document.getElementById('resultCount').textContent = products.length + ' product' + (products.length !== 1 ? 's' : '') + ' found';
  if (!products.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">search</div><h2>No products found</h2><p>Try adjusting your search or filters.</p></div>';
    return;
  }
  grid.innerHTML = products.map(p => {
    const imgSrc = p.imagename ? API + '/products/' + p.id + '/image' : null;
    const inStock = p.available && p.quantity > 0;
    const lowStock = p.quantity > 0 && p.quantity <= 5;
    const price = Number(p.price).toLocaleString('en-IN', {style:'currency', currency:'INR', maximumFractionDigits:0});
    const brand = p.Brand || p.brand || '';
    const imgHtml = imgSrc ? '<img src="' + imgSrc + '" alt="' + p.name + '" onerror="this.parentElement.innerHTML=\'<div class=no-img>car</div>\'">' : '<div class="no-img">car</div>';
    const badge = !inStock ? '<div class="card-badge out">Out of Stock</div>' : lowStock ? '<div class="card-badge">Low Stock</div>' : '';
    const qtyClass = p.quantity === 0 ? 'out-qty' : lowStock ? 'low' : '';
    const qtyText = p.quantity === 0 ? 'Out of stock' : lowStock ? 'Only ' + p.quantity + ' left' : p.quantity + ' in stock';
    return '<div class="product-card" onclick="viewProduct(' + p.id + ')">'
      + badge
      + '<div class="card-img">' + imgHtml + '</div>'
      + '<div class="card-body">'
      + '<div class="card-brand">' + brand + '</div>'
      + '<div class="card-name">' + p.name + '</div>'
      + '<div class="card-category">' + (p.category || 'General') + '</div>'
      + '<div class="card-price">' + price + '</div>'
      + '<div class="card-qty ' + qtyClass + '">' + qtyText + '</div>'
      + '<div class="card-actions" onclick="event.stopPropagation()">'
      + '<button class="btn-cart" onclick="openEditModal(' + p.id + ')">Edit</button>'
      + '<button class="btn-icon" onclick="confirmDelete(' + p.id + ')" title="Delete">Del</button>'
      + '</div></div></div>';
  }).join('');
}

function filterProducts() {
  let list = [...allProducts];
  const q = document.getElementById('searchInput').value.toLowerCase();
  const onlyAvail = document.getElementById('filterAvailable').checked;
  const minP = parseFloat(document.getElementById('priceMin').value) || 0;
  const maxP = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const sort = document.getElementById('sortSelect').value;
  if (activeCategory) list = list.filter(p => (p.category||'').toLowerCase() === activeCategory.toLowerCase());
  if (q) list = list.filter(p => [p.name, p.Brand||p.brand, p.category, p.description].join(' ').toLowerCase().includes(q));
  if (onlyAvail) list = list.filter(p => p.available && p.quantity > 0);
  list = list.filter(p => Number(p.price) >= minP && Number(p.price) <= maxP);
  const checkedBrands = [...document.querySelectorAll('#brandFilters input:checked')].map(i => i.value);
  if (checkedBrands.length) list = list.filter(p => checkedBrands.includes(p.Brand||p.brand||''));
  if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  else if (sort === 'name-asc') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'qty-desc') list.sort((a,b) => b.quantity - a.quantity);
  renderProducts(list);
}

function buildCategoryNav() {
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
  document.getElementById('categoryNav').innerHTML =
    '<button class="nav-pill active" onclick="filterCategory(\'\', this)">All</button>' +
    cats.map(c => '<button class="nav-pill" onclick="filterCategory(\'' + c + '\', this)">' + c + '</button>').join('');
}

function buildBrandFilters() {
  const brands = [...new Set(allProducts.map(p => p.Brand||p.brand).filter(Boolean))];
  document.getElementById('brandFilters').innerHTML = brands.map(b =>
    '<label class="filter-item"><input type="checkbox" value="' + b + '" onchange="filterProducts()"> ' + b + '</label>'
  ).join('');
}

function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}

function viewProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const imgSrc = p.imagename ? API + '/products/' + p.id + '/image' : null;
  const price = Number(p.price).toLocaleString('en-IN', {style:'currency', currency:'INR'});
  const date = p.releaseDate ? new Date(p.releaseDate).toLocaleDateString('en-IN', {year:'numeric',month:'short',day:'numeric'}) : 'N/A';
  const brand = p.Brand || p.brand || 'N/A';
  const imgHtml = imgSrc ? '<img src="' + imgSrc + '" alt="' + p.name + '" onerror="this.parentElement.innerHTML=\'<span style=font-size:56px>car</span>\'">' : '<span style="font-size:56px">car</span>';
  document.getElementById('detailTitle').textContent = p.name;
  document.getElementById('detailBody').innerHTML =
    '<div class="detail-img">' + imgHtml + '</div>'
    + '<div class="detail-brand">' + brand + '</div>'
    + '<div class="detail-name">' + p.name + '</div>'
    + '<div class="detail-desc">' + (p.description || 'No description provided.') + '</div>'
    + '<div class="detail-price">' + price + '</div>'
    + '<div class="detail-meta">'
    + '<div class="meta-chip">Category<strong>' + (p.category||'N/A') + '</strong></div>'
    + '<div class="meta-chip">Stock<strong>' + p.quantity + ' units</strong></div>'
    + '<div class="meta-chip">Status<strong style="color:' + (p.available?'var(--success)':'var(--danger)') + '">' + (p.available?'Available':'Unavailable') + '</strong></div>'
    + '<div class="meta-chip">Release<strong>' + date + '</strong></div>'
    + '</div>'
    + '<div class="detail-actions">'
    + '<button class="btn-edit" onclick="closeModal(\'detailModal\');openEditModal(' + p.id + ')">Edit Product</button>'
    + '<button class="btn-delete" onclick="closeModal(\'detailModal\');confirmDelete(' + p.id + ')">Delete</button>'
    + '</div>';
  openModal('detailModal');
}

function openAddModal() {
  document.getElementById('formTitle').textContent = 'Add Product';
  ['editId','fName','fBrand','fCategory','fPrice','fQty','fDate','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fAvailable').value = 'true';
  document.getElementById('imageFile').value = '';
  document.getElementById('imgPreview').innerHTML = '<span style="font-size:28px;color:#ccc">Photo</span>';
  openModal('formModal');
}

function openEditModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('formTitle').textContent = 'Edit Product';
  document.getElementById('editId').value = p.id;
  document.getElementById('fName').value = p.name || '';
  document.getElementById('fBrand').value = p.Brand || p.brand || '';
  document.getElementById('fCategory').value = p.category || '';
  document.getElementById('fPrice').value = p.price || '';
  document.getElementById('fQty').value = p.quantity || '';
  document.getElementById('fDesc').value = p.description || '';
  document.getElementById('fAvailable').value = String(p.available);
  document.getElementById('fDate').value = p.releaseDate ? new Date(p.releaseDate).toISOString().split('T')[0] : '';
  document.getElementById('imageFile').value = '';
  const imgSrc = p.imagename ? API + '/products/' + p.id + '/image' : null;
  document.getElementById('imgPreview').innerHTML = imgSrc ? '<img src="' + imgSrc + '" alt="">' : '<span style="font-size:28px;color:#ccc">Photo</span>';
  openModal('formModal');
}

function previewImg(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('imgPreview').innerHTML = '<img src="' + e.target.result + '" alt="">'; };
  reader.readAsDataURL(input.files[0]);
}

async function saveProduct() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('fName').value.trim();
  const brand = document.getElementById('fBrand').value.trim();
  const category = document.getElementById('fCategory').value.trim();
  const price = document.getElementById('fPrice').value;
  const qty = document.getElementById('fQty').value;
  const imageFile = document.getElementById('imageFile').files[0];

  if (!name || !brand || !category || !price || !qty) { toast('Fill all required fields.', 'error'); return; }
  if (!id && !imageFile) { toast('Please select an image.', 'error'); return; }

  const productObj = {
    name: name,
    Brand: brand,
    category: category,
    price: parseFloat(price),
    quantity: parseInt(qty),
    description: document.getElementById('fDesc').value || '',
    available: document.getElementById('fAvailable').value === 'true',
    releaseDate: document.getElementById('fDate').value || '2000-01-01'
  };
  productObj.id = id ? parseInt(id) : 0;

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = 'Saving...';

  try {
    const fd = new FormData();
    fd.append('p', new Blob([JSON.stringify(productObj)], {type: 'application/json'}), 'product.json');

    if (imageFile) {
      fd.append('imageFile', imageFile, imageFile.name);
    } else {
      // Re-fetch existing image for PUT without image change
      const imgRes = await fetch(API + '/products/' + id + '/image');
      if (!imgRes.ok) { toast('Re-upload image to update product.', 'error'); btn.disabled=false; btn.textContent='Save Product'; return; }
      const imgBlob = await imgRes.blob();
      const existingP = allProducts.find(x => x.id === parseInt(id));
      fd.append('imageFile', imgBlob, (existingP && existingP.imagename) || 'image.jpg');
    }

    const url = id ? API + '/products/' + id : API + '/products';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, {method: method, body: fd});
    const txt = await res.text();

    console.log('Status:', res.status, '| Response:', txt);

    if (!res.ok) {
      let msg = 'HTTP ' + res.status + ': ';
      try { const j = JSON.parse(txt); msg += j.message || j.error || txt; } catch(e) { msg += txt; }
      toast(msg.substring(0, 200), 'error');
      return;
    }
    toast(id ? 'Product updated!' : 'Product added!', 'success');
    closeModal('formModal');
    await loadProducts();
  } catch(e) {
    console.error(e);
    toast('Network error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Product';
  }
}

function confirmDelete(id) {
  const p = allProducts.find(x => x.id === id);
  document.querySelector('.confirm-box p').textContent = 'Delete "' + (p ? p.name : 'this product') + '"? This cannot be undone.';
  document.getElementById('confirmDelBtn').onclick = () => doDelete(id);
  openModal('confirmModal');
}

async function doDelete(id) {
  try {
    const res = await fetch(API + '/products/' + id, {method: 'DELETE'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('Product deleted.', 'success');
    closeModal('confirmModal');
    await loadProducts();
  } catch(e) {
    toast('Delete failed: ' + e.message, 'error');
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeDetailIfOutside(e) { if (e.target.id === 'detailModal') closeModal('detailModal'); }
function closeFormIfOutside(e) { if (e.target.id === 'formModal') closeModal('formModal'); }

function toast(msg, type) {
  type = type || 'success';
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = (type === 'success' ? 'OK ' : 'ERR ') + '<span style="word-break:break-word">' + msg + '</span>';
  c.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 5000);
}

loadProducts();
</script>
</body>
